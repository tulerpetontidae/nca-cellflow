# LatentNCA + Q-head style loss (predicts only z, NOT [embed||z]) — InfoGAN-style.
# Direct comparison against latent-hidden6-ema-steps30-v2-ss001-plate-fp-balanced-style-lb (rank 39, FID_g 22.01, FID_c 72.27).
# Hypothesis: full-StyleEncoder hurts FID_c because the encoder cannot reliably classify
# 34 BBBC021 compounds, so the embed-prediction subspace of the loss produces a noisy
# gradient that pulls G outputs onto a mean-compound subspace. Stripping embed prediction
# and keeping only z prediction should remove the harm while still encouraging z usage.
# 160k iterations to match the budget of the actual best run, not the 80k of the original style run.

# data
metadata_csv: /oak/stanford/groups/ccurtis2/users/alomakin/projects/nca-cellflow/data/bbbc021_six/metadata/bbbc021_df_all.csv
image_dir: /oak/stanford/groups/ccurtis2/users/alomakin/projects/nca-cellflow/data/bbbc021_six
image_size: 48
plate_match: true
balanced_cpd: true

# model
nca_type: latent
z_dim: 16
nca_hidden_dim: 128
nca_cond_dim: 32
cond_type: fingerprint
fp_path: /oak/stanford/groups/ccurtis2/users/alomakin/projects/nca-cellflow/data/bbbc021_six/metadata/emb_morgan_fp.csv
hidden_channels: 6
fire_rate: 1.0
nca_steps: 30
step_size: 0.01

# discriminator
d_stages: 3
d_base_channels: 32
d_blocks: 2
d_cardinality: 4
d_expansion: 2
d_kernel_size: 3
d_embed_dim: 32

# training
batch_size: 128
iterations: 160000
lr_g: 0.0002
lr_d: 0.0002
beta1: 0.0
beta2: 0.99
gamma: 1.0
grad_clip: 1.0
ema_decay: 0.999
ema_warmup_steps: 1000
style_weight: 1.0
style_predict_z_only: true

# misc
num_workers: 8
save_every: 5000
vis_every: 1000
fid_every: 5000
fid_trajectory_every: 5000
val_fid: true
grad_diag_every: 1000
checkpoint_dir: /oak/stanford/groups/ccurtis2/users/alomakin/projects/nca-cellflow/checkpoints/latent-hidden6-ema-steps30-v2-ss001-plate-fp-balanced-style-qhead-lb
wandb_project: nca-cellflow
