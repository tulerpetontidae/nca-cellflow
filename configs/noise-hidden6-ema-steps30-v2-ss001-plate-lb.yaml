# NoiseNCA with 6 hidden channels + EMA, 30 NCA steps, step_size=0.01, plate matching, large batch (128)

# data
metadata_csv: /oak/stanford/groups/ccurtis2/users/alomakin/projects/nca-cellflow/data/bbbc021_six/metadata/bbbc021_df_all.csv
image_dir: /oak/stanford/groups/ccurtis2/users/alomakin/projects/nca-cellflow/data/bbbc021_six
image_size: 48
plate_match: true

# model
nca_type: noise
noise_channels: 1
nca_hidden_dim: 128
nca_cond_dim: 32
hidden_channels: 6
fire_rate: 1.0
nca_steps: 30
step_size: 0.01

# discriminator
d_stages: 3
d_base_channels: 32
d_blocks: 2
d_cardinality: 4
d_expansion: 2
d_kernel_size: 3
d_embed_dim: 32

# training
batch_size: 128
iterations: 80000
lr_g: 0.0002
lr_d: 0.0002
beta1: 0.0
beta2: 0.99
gamma: 1.0
grad_clip: 1.0
ema_decay: 0.999
ema_warmup_steps: 1000

# misc
num_workers: 8
save_every: 5000
vis_every: 1000
fid_every: 1000
fid_trajectory_every: 5000
grad_diag_every: 1000
checkpoint_dir: /oak/stanford/groups/ccurtis2/users/alomakin/projects/nca-cellflow/checkpoints/noise-hidden6-ema-steps30-v2-ss001-plate-lb
wandb_project: nca-cellflow
