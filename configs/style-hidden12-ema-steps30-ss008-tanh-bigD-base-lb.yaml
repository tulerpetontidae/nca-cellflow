# Style-NCA: self-supervised NCA with style encoder, h12, bigD, no regularisation
# Baseline: style recon only, no pool, no KL, no TC, no intermediate
# Train: python scripts/train_style_nca.py --config configs/style-hidden12-ema-steps30-ss008-tanh-bigD-base-lb.yaml

# data
image_size: 48

# NCA (LatentNCA, dummy single class, z from style encoder)
z_dim: 32
nca_hidden_dim: 128
nca_cond_dim: 4
hidden_channels: 12
fire_rate: 1.0
nca_steps: 30
step_size: 0.08
use_tanh: true

# style encoder (ResBlk, probe-calibrated w128-d4)
s_base_channels: 128
s_num_downsamples: 4
s_max_channels: 512

# discriminator (bigD, unconditional)
d_stages: 3
d_base_channels: 48
d_blocks: 3
d_cardinality: 4
d_expansion: 2
d_kernel_size: 3

# style reconstruction
style_weight: 1.0

intermediate_weight: 0.0

use_pool: false

# training
batch_size: 128
iterations: 160000
lr_g: 0.0002
lr_d: 0.0002
beta1: 0.0
beta2: 0.99
gamma: 1.0
grad_clip: 1.0
ema_decay: 0.999
ema_warmup_steps: 1000

# misc
num_workers: 8
save_every: 5000
vis_every: 1000
fid_every: 5000
wandb_project: nca-cellflow-homeostasis
