# CellFlux (flow matching + UNet) baseline — 96px full resolution
# 96x96 version of cellflux-bbbc021-paper-lb (cfg_scale=1.2, paper settings).

# data
metadata_csv: data/bbbc021_six/metadata/bbbc021_df_all.csv
image_dir: data/bbbc021_six
image_size: 96
plate_match: true
iter_trt: true
fp_path: data/bbbc021_six/metadata/emb_morgan_fp.csv

# model
model_channels: 128
num_res_blocks: 4
dropout: 0.3
channel_mult: [2, 2, 2]
attention_resolutions: [2]
condition_dim: 1024

# flow matching
noise_level: 0.5
noise_prob: 0.5
class_drop_prob: 0.2
cfg_scale: 1.2
skewed_timesteps: true
edm_schedule: true
ode_method: heun
ode_nfe: 50

# training
batch_size: 128
iterations: 80000
lr: 0.0001
beta1: 0.9
beta2: 0.95
grad_clip: 1.0
ema_decay: 0.999
ema_warmup_steps: 1000

# misc
num_workers: 8
save_every: 5000
vis_every: 5000
fid_every: 5000
fid_trajectory_every: 5000
fid_trajectory_noise: clean
fid_trajectory_naming: step
fid_trajectory_ode_steps: 30
wandb_project: nca-cellflow-comp
